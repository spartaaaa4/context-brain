<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Context Brain{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    {% if current_user.is_authenticated %}
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="nav-brand">
                <span class="brain-icon">🧠</span>
                <span>Context Brain</span>
            </a>
        </div>
        <div class="nav-right">
            {% block nav_extra %}{% endblock %}
            <div class="nav-user">
                {% if current_user.profile_pic %}
                <img src="{{ current_user.profile_pic }}" alt="" class="nav-avatar">
                {% endif %}
                <span class="nav-username">{{ current_user.display_name }}</span>
                <a href="/logout" class="nav-link">Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
